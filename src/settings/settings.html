<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – Naviky</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main class="container">

    <!-- Header -->
    <header class="header">
      <a href="#" id="backBtn" class="back-btn">← Back</a>
      <h1 class="page-title">Settings</h1>
    </header>

    <!-- ─── Personalization ─────────────────────────────────────── -->
    <section class="card">
      <h2 class="card-title">Personalization</h2>

      <div class="form-group">
        <label for="greetingInput">Custom Greeting</label>
        <input type="text" id="greetingInput" class="input"
               placeholder="Leave empty for auto (Good morning / afternoon / evening)">
      </div>

      <div class="form-group">
        <label for="userNameInput">Your Name</label>
        <input type="text" id="userNameInput" class="input"
               placeholder="Displayed after the greeting">
      </div>

      <div class="form-group">
        <label>Theme</label>
        <div class="theme-toggle">
          <button class="theme-btn" data-theme="light" id="themeLightBtn">☀️ Light</button>
          <button class="theme-btn" data-theme="dark"  id="themeDarkBtn">🌙 Dark</button>
        </div>
      </div>
    </section>

    <!-- ─── Links & Shortcuts Management ────────────────────────── -->
    <section class="card">
      <h2 class="card-title">Links & Shortcuts</h2>
      <p class="info-text">
        Link groups and shortcuts are managed from the Manage page.
      </p>
      <p class="hint">
        On the new tab page, search for <code>links</code> to open the management page.
      </p>
    </section>
    <!-- ─── AI Assistant ─────────────────────────────────── -->
    <section class="card">
      <h2 class="card-title">AI 助手</h2>
      <p class="info-text">
        配置任意兼容 OpenAI 接口的 AI 服务。在任意网页中划选文字，即可弹出浮窗进行翻译或解释。
      </p>

      <div class="form-group">
        <label for="aiEndpointInput">API 地址（Base URL）</label>
        <input type="text" id="aiEndpointInput" class="input"
               placeholder="https://api.openai.com/v1">
      </div>

      <div class="form-group">
        <label for="aiApiKeyInput">API 密钥</label>
        <div class="input-row">
          <input type="password" id="aiApiKeyInput" class="input"
                 placeholder="sk-..." autocomplete="off">
          <button class="btn btn-sm" id="aiApiKeyToggle" type="button">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="aiModelInput">模型名称</label>
        <input type="text" id="aiModelInput" class="input"
               placeholder="gpt-4o-mini">
      </div>

      <div class="form-group">
        <label for="aiTargetLangInput">翻译目标语言</label>
        <input type="text" id="aiTargetLangInput" class="input"
               placeholder="Chinese">
      </div>

      <div class="form-group">
        <label for="aiTranslatePromptInput">翻译 Prompt（可用 {text} 和 {lang} 作为占位符）</label>
        <textarea id="aiTranslatePromptInput" class="input input-textarea" rows="3"
                  placeholder="Translate the following text to {lang}. Output only the translation:\n\n{text}"></textarea>
      </div>

      <div class="form-group">
        <label for="aiExplainPromptInput">解释 Prompt（可用 {text} 作为占位符）</label>
        <textarea id="aiExplainPromptInput" class="input input-textarea" rows="3"
                  placeholder="Explain the following text briefly and clearly in {lang}:\n\n{text}"></textarea>
      </div>

      <div class="form-group">
        <label>自定义 Prompt 按钮</label>
        <p class="hint" style="margin-bottom:0.6rem">每个按钮会在划词弹窗中显示，可用 <code>{text}</code> 作为所选文字的占位符。</p>
        <div id="customPromptsContainer"></div>
        <button class="btn btn-sm" id="addCustomPromptBtn" type="button">+ 添加按钮</button>
      </div>

      <button class="btn" id="aiTestBtn">⚡ 测试连接</button>
      <span id="aiTestResult" class="hint" style="margin-left:0.75rem;"></span>
    </section>
    <!-- ─── Data Management ─────────────────────────────────────── -->
    <section class="card">
      <h2 class="card-title">Data Management</h2>
      <div class="data-actions">
        <button class="btn" id="exportBtn">📦 Export Data</button>
        <button class="btn" id="importBtn">📥 Import Data</button>
        <input type="file" id="importFile" accept=".json" hidden>
      </div>
    </section>

  </main>

  <script type="module" src="settings.js"></script>
</body>
</html>
