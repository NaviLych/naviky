<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – Naviky</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main class="container">

    <!-- Header -->
    <header class="header">
      <a href="#" id="backBtn" class="back-btn">← Back</a>
      <h1 class="page-title">Settings</h1>
    </header>

    <!-- ─── Personalization ─────────────────────────────────────── -->
    <section class="card">
      <h2 class="card-title">Personalization</h2>

      <div class="form-group">
        <label for="greetingInput">Custom Greeting</label>
        <input type="text" id="greetingInput" class="input"
               placeholder="Leave empty for auto (Good morning / afternoon / evening)">
      </div>

      <div class="form-group">
        <label for="userNameInput">Your Name</label>
        <input type="text" id="userNameInput" class="input"
               placeholder="Displayed after the greeting">
      </div>

      <div class="form-group">
        <label>Theme</label>
        <div class="theme-toggle">
          <button class="theme-btn" data-theme="light" id="themeLightBtn">☀️ Light</button>
          <button class="theme-btn" data-theme="dark"  id="themeDarkBtn">🌙 Dark</button>
        </div>
      </div>
    </section>

    <!-- ─── Shortcuts ───────────────────────────────────────────── -->
    <section class="card">
      <h2 class="card-title">Shortcuts</h2>
      <p class="hint">
        Define keyword shortcuts for quick search.
        Use <code>%s</code> as query placeholder.
        Append <code>{+}</code> to replace spaces with <code>+</code>,
        e.g. <code>https://bing.com/search?q=%s{+}</code>
      </p>

      <div id="shortcutList" class="editable-list"></div>
      <button class="btn btn-accent" id="addShortcutBtn">+ Add Shortcut</button>
    </section>

    <!-- ─── Link Groups ─────────────────────────────────────────── -->
    <section class="card">
      <h2 class="card-title">Link Groups</h2>

      <div class="groups-container">
        <!-- Sidebar: group list -->
        <div class="groups-sidebar">
          <ul id="groupList" class="group-list"></ul>
          <button class="btn btn-accent btn-sm" id="addGroupBtn">+ New Group</button>
        </div>

        <!-- Content: links in selected group -->
        <div class="groups-content" id="groupDetail">
          <p class="placeholder-text">Select a group to manage its links</p>
        </div>
      </div>
    </section>

    <!-- ─── Data Management ─────────────────────────────────────── -->
    <section class="card">
      <h2 class="card-title">Data Management</h2>
      <div class="data-actions">
        <button class="btn" id="exportBtn">📦 Export Data</button>
        <button class="btn" id="importBtn">📥 Import Data</button>
        <input type="file" id="importFile" accept=".json" hidden>
      </div>
    </section>

  </main>

  <script type="module" src="settings.js"></script>
</body>
</html>
